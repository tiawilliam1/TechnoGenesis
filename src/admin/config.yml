backend:
  name: git-gateway
  gateway_url: /.netlify/git/github
  branch: main

local_backend: true

media_folder: "src/uploads"
public_folder: "/uploads"

collections:
  - name: "site_pages"
    label: "Site Pages"
    files:
      - label: "About Me"
        name: "about_page"
        file: "src/_data/about.json"
        fields:
          - { label: "Page Title", name: "page_title", widget: "string" }
          - { label: "Short Intro", name: "short_intro", widget: "text" }
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Full Name", name: "full_name", widget: "string" }
          - { label: "Role", name: "role", widget: "string" }
          - { label: "Opening Paragraph", name: "opening_paragraph", widget: "text" }
          - { label: "Opening Keyline", name: "opening_keyline", widget: "text" }
          - { label: "Main Intro", name: "intro_text", widget: "text", required: false }
          - { label: "Profile Image", name: "profile_image", widget: "image" }
          - { label: "Profile Image Alt", name: "profile_image_alt", widget: "string" }
          - { label: "Quick Facts Title", name: "quick_facts_title", widget: "string" }
          - label: "Quick Facts"
            name: "quick_facts"
            widget: "list"
            field: { label: "Fact", name: "item", widget: "string" }
          - { label: "Career Timeline Title", name: "career_timeline_title", widget: "string" }
          - { label: "Career Timeline Subline", name: "career_timeline_subline", widget: "text" }
          - label: "Career Timeline"
            name: "career_timeline"
            widget: "list"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Role", name: "role", widget: "string" }
              - { label: "Highlights", name: "highlights", widget: "text" }
          - { label: "Credentials Title", name: "credentials_title", widget: "string" }
          - { label: "Credentials Subline", name: "credentials_subline", widget: "text" }
          - label: "Credentials"
            name: "credentials"
            widget: "list"
            field: { label: "Credential", name: "item", widget: "string" }
          - { label: "Professional Highlights Title", name: "professional_highlights_title", widget: "string" }
          - { label: "Professional Highlights Subline", name: "professional_highlights_subline", widget: "text", required: false }
          - label: "Professional Highlights"
            name: "professional_highlights"
            widget: "list"
            field: { label: "Highlight", name: "item", widget: "string" }
          - { label: "Scientific Achievements Title", name: "scientific_achievements_title", widget: "string" }
          - { label: "Scientific Achievements Subline", name: "scientific_achievements_subline", widget: "text", required: false }
          - label: "Scientific Achievements"
            name: "scientific_achievements"
            widget: "list"
            field: { label: "Achievement", name: "item", widget: "string" }

  - name: "posts"
    label: "Publications"
    folder: "src/posts"
    create: true
    editor:
      preview: false
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Abstract / Short Preview", name: "abstract", widget: "text", required: false, hint: "Short preview shown before the full text, especially in Further Insights." }
      - { label: "Publication Year", name: "publication_year", widget: "number", value_type: "int", required: false, hint: "Used to keep publications in chronological order." }
      - { label: "Publication Type / Format", name: "publication_type", widget: "string", default: "Article", required: false, hint: "Free text shown as a badge, e.g. Article, Conference paper, Keynote talk, Accepted abstract, Presentation." }
      - { label: "Publication Type / Format (French)", name: "publication_type_fr", widget: "string", required: false, hint: "Optional French badge text. If empty, the main type is used." }
      - label: "Publication Section"
        name: "publication_area"
        widget: "select"
        default: "photonics_semiconductors"
        options:
          - { label: "Publications in Patent Information", value: "patent_information" }
          - { label: "Publications in Photonics & Semiconductors", value: "photonics_semiconductors" }
          - { label: "Further Insights", value: "further_insights" }
        hint: "Controls which section this publication appears in."
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Publication Link", name: "publication_link", widget: "string", required: false, hint: "Optional. Use a full URL when available; working papers can be published without a link." }
      - { label: "Publication File / Slides PDF", name: "publication_file", widget: "file", required: false, hint: "Optional. Upload slides, an abstract, or a PDF. This can be used instead of an external link." }
      - { label: "Enable Publication Button", name: "publication_button_enabled", widget: "boolean", default: true, required: false, hint: "Turn this off when the publication, slides, or link should not be clickable yet." }
      - { label: "Button Label", name: "publication_button_label", widget: "string", required: false, hint: "Optional. Example: View publication, View slides, Download abstract, Conference page." }
      - { label: "Button Label (French)", name: "publication_button_label_fr", widget: "string", required: false, hint: "Optional French button label." }
      - { label: "Show in Current Collaboration Section", name: "current_collaboration", widget: "boolean", default: false, required: false, hint: "When enabled, this publication also appears in Current collaboration and submission topics." }
      - { label: "Current Collaboration Status", name: "current_status", widget: "string", default: "Working paper", required: false }
      - { label: "Body", name: "body", widget: "text", required: false, hint: "Optional. Markdown syntax is supported here, but this plain text editor avoids the Decap rich-text crash." }
